services:
  # M1 choice: one "app" service runs both FastAPI (:8000) and Dash (:8050) in a
  # single container — simplest thing that gets both up. Split into separate
  # services later if the processes need independent scaling/restart behavior.
  app:
    build: .
    command: sh -c "python app.py & exec uvicorn api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
      - "8050:8050"
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"  # exposed to the host so local dev / pytest can use real Redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
